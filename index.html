:root {
  --gold: #f5c842;
  --gold2: #e8a800;
  --bg: #0a0612;
  --purple: #2a0a4a;
}

html { background: #0a0612; }

body {
  background: #0a0612;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans JP', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
}

#bgCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  display: block;
}



/* メインコンテナ */
.container {
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

/* タイトル */
.title-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: fadeDown 0.8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

.title-sub {
  font-family: 'Zen Dots', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  opacity: 0.8;
}

.title-main {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900;
  font-size: clamp(2.4rem, 8vw, 3.8rem);
  color: white;
  letter-spacing: 0.08em;
  line-height: 1.1;
  text-shadow: 0 0 40px rgba(245,200,66,0.4), 0 2px 20px rgba(0,0,0,0.8);
}

.title-accent {
  color: var(--gold);
  position: relative;
}
.title-accent::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 2px;
}

/* ガチャマシン風アイコン */
.gacha-icon {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #7b2fff, #2a0a4a 60%);
  border: 3px solid var(--gold);
  box-shadow: 0 0 30px rgba(245,200,66,0.4), inset 0 0 20px rgba(123,47,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.2rem;
  animation: float 3s ease-in-out infinite, fadeDown 0.8s 0.1s cubic-bezier(.22,1,.36,1) both;
  cursor: default;
  user-select: none;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ボタン */
.btn-wrap {
  animation: fadeUp 0.9s 0.3s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(135deg, #f5c842 0%, #e8a800 50%, #f5c842 100%);
  background-size: 200% 200%;
  color: #1a0a00;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900;
  font-size: clamp(1.3rem, 4vw, 1.7rem);
  letter-spacing: 0.12em;
  padding: 22px 52px;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 8px 40px rgba(245,200,66,0.5), 0 2px 0 rgba(255,255,255,0.2) inset;
  transition: transform 0.15s, box-shadow 0.15s, background-position 0.4s;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 60px;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%);
  pointer-events: none;
}

.btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 14px 50px rgba(245,200,66,0.7), 0 2px 0 rgba(255,255,255,0.2) inset;
  background-position: 100% 100%;
}

.btn:active {
  transform: translateY(1px) scale(0.98);
  box-shadow: 0 4px 20px rgba(245,200,66,0.4);
}

.btn-icon { font-size: 1.4em; }

/* キラキラエフェクト */
.sparkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}
.sp {
  position: absolute;
  font-size: 1.2rem;
  opacity: 0;
  animation: spFloat var(--spd, 4s) ease-in-out infinite var(--spdl, 0s);
}
@keyframes spFloat {
  0% { opacity: 0; transform: translateY(0) rotate(0deg); }
  20% { opacity: 1; }
  80% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-80px) rotate(360deg); }
}

/* ログインセクション */
.login-section {
  animation: fadeUp 1s 0.6s cubic-bezier(.22,1,.36,1) both;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(245,200,66,0.2);
  border-radius: 20px;
  padding: 24px 32px;
  width: min(360px, 90vw);
}
.login-badge {
  font-size: 0.72rem;
  font-weight: 900;
  letter-spacing: 0.2em;
  color: var(--gold);
  background: rgba(245,200,66,0.12);
  padding: 4px 14px;
  border-radius: 20px;
  border: 1px solid rgba(245,200,66,0.3);
}
.login-promo {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.05em;
  text-align: center;
}
.promo-highlight { color: var(--gold); font-weight: 900; }
.login-box { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.login-input {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 11px 16px;
  color: white;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.login-input::placeholder { color: rgba(255,255,255,0.3); }
.login-input:focus { border-color: rgba(245,200,66,0.5); }
.login-btn {
  background: linear-gradient(135deg, #f5c842, #e8a800);
  color: #1a0a00;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900;
  font-size: 0.95rem;
  letter-spacing: 0.15em;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(245,200,66,0.3);
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,200,66,0.5); }
.login-btn:active { transform: translateY(1px); }
.login-success {
  display: none;
  color: white;
  font-weight: 900;
  font-size: 1.1rem;
  text-align: center;
  line-height: 1.8;
  animation: popIn 0.5s cubic-bezier(.22,1,.36,1);
}
.success-sub { font-size: 0.85rem; font-weight: 400; color: var(--gold); }
@keyframes popIn {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}

/* 小テキスト */
.hint {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.15em;
  animation: fadeUp 1s 0.5s cubic-bezier(.22,1,.36,1) both;
}

<script>
  function doLogin() {
    const email = document.getElementById('emailInput').value;
    const pass = document.getElementById('passInput').value;
    if (!email && !pass) {
      document.getElementById('emailInput').style.borderColor = 'rgba(255,100,100,0.6)';
      setTimeout(() => document.getElementById('emailInput').style.borderColor = '', 1000);
      return;
    }
    document.getElementById('loginBox').style.display = 'none';
    const s = document.getElementById('loginSuccess');
    s.style.display = 'block';
  }

  // ===== Canvas背景（完全黒塗り＋ドット星空＋グロー） =====
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');

  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 1.2,
        bright: 0.3 + Math.random() * 0.7
      });
    }
    // ドット絵風の大きめ星をいくつか追加
    for (let i = 0; i < 18; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 2.5,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.6,
        bright: 1,
        dot: true
      });
    }
  }

  let t = 0;
  function draw() {
    t += 0.016;

    // 完全に黒で塗りつぶし（これで白くならない）
    ctx.fillStyle = '#0a0612';
    ctx.fillRect(0, 0, W, H);

    // 中央グロー
    const gx = W / 2, gy = H / 2;
    const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.min(W, H) * 0.5);
    grad.addColorStop(0, `rgba(80,10,150,${0.25 + Math.sin(t*0.5)*0.06})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // 星を描画
    for (const s of stars) {
      const alpha = s.bright * (0.4 + 0.6 * (Math.sin(t * s.speed + s.phase) * 0.5 + 0.5));
      if (s.dot) {
        // ドット絵風：2x2の四角い星
        ctx.fillStyle = `rgba(255,255,220,${alpha})`;
        ctx.fillRect(Math.floor(s.x), Math.floor(s.y), 2, 2);
        // 十字型のグロー
        ctx.fillStyle = `rgba(255,255,200,${alpha * 0.4})`;
        ctx.fillRect(Math.floor(s.x) - 1, Math.floor(s.y), 4, 2);
        ctx.fillRect(Math.floor(s.x), Math.floor(s.y) - 1, 2, 4);
      } else {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); });

  // キラキラ
  const spEl = document.getElementById('sparkles');
  const gems = ['✦','✧','⋆','★','◆','✨'];
  for (let i = 0; i < 14; i++) {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.textContent = gems[Math.floor(Math.random()*gems.length)];
    sp.style.cssText = `
      left:${5+Math.random()*90}%;
      top:${20+Math.random()*60}%;
      --spd:${3+Math.random()*4}s;
      --spdl:${Math.random()*5}s;
      font-size:${0.7+Math.random()*0.8}rem;
      color: hsl(${40+Math.random()*20}, 100%, ${60+Math.random()*30}%);
    `;
    spEl.appendChild(sp);
  }
</script>
