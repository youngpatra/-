<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>見附出身のレアキャラを当てろ。</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:#050a14;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;}
.screen.hidden{opacity:0;pointer-events:none;}
/* TITLE */
#titleScreen{background:linear-gradient(180deg,#020810 0%,#06142a 40%,#0a1f3d 70%,#1a2a1a 100%);overflow:hidden;}
.stars-layer{position:absolute;inset:0;}
.star-dot{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate;}
@keyframes twinkle{from{opacity:.2;}to{opacity:1;}}
.houses{position:absolute;bottom:0;left:0;right:0;}
.lamp-glow{position:absolute;bottom:18%;left:50%;width:200px;height:200px;background:radial-gradient(circle,rgba(255,220,100,.18) 0%,transparent 70%);transform:translateX(-50%);animation:lampPulse 3s infinite alternate;}
@keyframes lampPulse{from{opacity:.7;}to{opacity:1;}}
.title-wrap{position:relative;z-index:10;text-align:center;padding:20px;}
.title-main{font-size:clamp(1.4rem,5vw,2.2rem);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(100,180,255,.8),0 2px 4px rgba(0,0,0,.9);line-height:1.4;margin-bottom:8px;}
.title-sub{font-size:clamp(.9rem,3vw,1.1rem);color:rgba(180,210,255,.7);margin-bottom:32px;letter-spacing:.2em;}
.title-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.start-btn{padding:16px 40px;font-size:1.2rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#ff6b35,#ff3f00);color:#fff;border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 30px rgba(255,100,0,.6);transition:transform .15s;animation:btnPulse 2s infinite alternate;}
.start-btn:hover{transform:scale(1.06);}
@keyframes btnPulse{from{box-shadow:0 0 20px rgba(255,100,0,.5);}to{box-shadow:0 0 40px rgba(255,150,0,.8);}}
.zukan-btn{padding:16px 28px;font-size:1rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#2255aa,#113388);color:#fff;border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 20px rgba(50,100,255,.4);transition:transform .15s;position:relative;}
.zukan-btn:hover{transform:scale(1.05);}
.zukan-badge{position:absolute;top:-6px;right:-6px;background:#ff3f00;color:#fff;font-size:.7rem;font-weight:900;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
/* MODAL */
#modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#modal.show{opacity:1;pointer-events:all;}
.modal-box{background:linear-gradient(135deg,#1a0a2e,#2a0a1a);border:2px solid rgba(255,100,0,.6);border-radius:20px;padding:40px 32px;max-width:360px;width:90%;text-align:center;box-shadow:0 0 60px rgba(255,50,0,.3);}
.modal-box h2{color:#fff;font-size:1.1rem;line-height:1.7;margin-bottom:32px;}
.modal-box h2 span{color:#ff6b35;}
.modal-btns{display:flex;gap:16px;justify-content:center;}
.modal-btn{padding:14px 32px;font-size:1rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#ff4500,#cc2200);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .15s;}
.modal-btn:hover{transform:scale(1.05);}
/* GACHA */
#gachaScreen{background:radial-gradient(ellipse at center,#1a0530 0%,#000510 100%);overflow:hidden;}
.dragon-wrap{position:absolute;width:100%;top:0;left:0;display:flex;justify-content:center;z-index:5;}
.drag-hint{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);z-index:30;text-align:center;pointer-events:none;animation:hintBounce 1s infinite alternate;}
@keyframes hintBounce{from{transform:translateX(-50%) translateY(0);}to{transform:translateX(-50%) translateY(14px);}}
.drag-hint .hint-arrow{font-size:2rem;display:block;color:#FFD700;text-shadow:0 0 15px #ff6600;}
.drag-hint .hint-label{font-size:.9rem;color:rgba(255,255,200,.8);font-weight:700;letter-spacing:.15em;}
#teaseOverlay{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);opacity:0;pointer-events:none;transition:opacity .4s;}
#teaseOverlay.show{opacity:1;pointer-events:all;}
.tease-text{font-size:clamp(1.5rem,6vw,2.5rem);font-weight:900;color:#FFD700;text-shadow:0 0 30px #FFD700,0 0 60px #ff6600;text-align:center;padding:0 24px;line-height:1.8;}
.tease-msg{font-size:clamp(1rem,4vw,1.6rem);font-weight:700;color:#fff;text-align:center;margin-top:16px;text-shadow:0 0 20px rgba(255,100,0,.8);animation:teasePulse .6s infinite alternate;}
@keyframes teasePulse{from{opacity:.4;transform:scale(.97);}to{opacity:1;transform:scale(1.03);}}
.tease-sub{font-size:.85rem;color:rgba(255,255,255,.4);margin-top:12px;letter-spacing:.25em;}
.light-beams{position:absolute;inset:0;background:conic-gradient(from 0deg at 50% 30%,transparent 0deg,rgba(255,200,0,.08) 10deg,transparent 20deg,transparent 40deg,rgba(255,150,0,.06) 50deg,transparent 60deg,transparent 80deg,rgba(255,200,0,.08) 90deg,transparent 100deg,transparent 120deg,rgba(255,180,0,.05) 130deg,transparent 140deg,transparent 160deg,rgba(255,200,0,.07) 170deg,transparent 180deg,transparent 200deg,rgba(255,150,0,.06) 210deg,transparent 220deg,transparent 240deg,rgba(255,200,0,.08) 250deg,transparent 260deg,transparent 280deg,rgba(255,180,0,.05) 290deg,transparent 300deg,transparent 320deg,rgba(255,200,0,.07) 330deg,transparent 340deg,transparent 360deg);animation:rotateLights 8s linear infinite;}
@keyframes rotateLights{to{transform:rotate(360deg);}}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFly var(--dur,2s) var(--delay,0s) ease-out forwards;}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx,50px),var(--ty,-100px)) scale(0);opacity:0;}}
.capsule-wrap{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);opacity:0;z-index:20;animation:capsuleAppear .6s .2s ease-out forwards;}
@keyframes capsuleAppear{from{transform:translateX(-50%) scale(0) rotate(-20deg);opacity:0;}to{transform:translateX(-50%) scale(1) rotate(0deg);opacity:1;}}
@keyframes capsulePulse{from{transform:translateX(-50%) scale(1);filter:drop-shadow(0 0 10px #FFD700);}to{transform:translateX(-50%) scale(1.12);filter:drop-shadow(0 0 30px #ff6600);}}
.capsule-crack{animation:crackOpen .5s ease-out forwards;}
@keyframes crackOpen{0%{transform:scale(1);}30%{transform:scale(1.3) rotate(5deg);}60%{transform:scale(.8) rotate(-3deg);}100%{transform:scale(0);opacity:0;}}
.flash{position:fixed;inset:0;z-index:50;background:#fff;animation:flashOut .5s ease-out forwards;pointer-events:none;}
@keyframes flashOut{from{opacity:1;}to{opacity:0;}}
/* RAINBOW FLASH */
.rainbow-flash{position:fixed;inset:0;z-index:55;pointer-events:none;animation:rainbowAnim 1.2s ease-out forwards;}
@keyframes rainbowAnim{
  0%{background:linear-gradient(135deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff);opacity:1;}
  20%{background:linear-gradient(225deg,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff,#ff0000);opacity:.9;}
  40%{background:linear-gradient(315deg,#ffff00,#00ff00,#0088ff,#8800ff,#ff0000,#ff8800);opacity:.8;}
  60%{background:linear-gradient(45deg,#00ff00,#0088ff,#8800ff,#ff0000,#ff8800,#ffff00);opacity:.6;}
  80%{background:linear-gradient(135deg,#0088ff,#8800ff,#ff0000,#ff8800,#ffff00,#00ff00);opacity:.3;}
  100%{opacity:0;}
}
.shake{animation:shakeAnim .4s ease-in-out;}
@keyframes shakeAnim{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
/* CARD */
#cardScreen{background:radial-gradient(ellipse at center,#0a0a20 0%,#000 100%);overflow:hidden;}
.card-container{position:relative;z-index:10;text-align:center;padding:20px;}
.rarity-label{font-size:1rem;font-weight:700;letter-spacing:.3em;margin-bottom:12px;}
.rarity-vr .rarity-label{color:#FFD700;text-shadow:0 0 20px #FFD700;}
.rarity-sr .rarity-label{color:#C0C0C0;text-shadow:0 0 15px #C0C0C0;}
.rarity-c  .rarity-label{color:#88aaff;}
.char-card{display:inline-block;border-radius:20px;padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden;animation:cardReveal .7s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes cardReveal{from{opacity:0;transform:scale(.5) rotateY(90deg);}to{opacity:1;transform:scale(1) rotateY(0deg);}}
.rarity-vr .char-card{background:linear-gradient(135deg,#1a1000,#3a2800);border:3px solid #FFD700;box-shadow:0 0 40px rgba(255,215,0,.6),0 0 80px rgba(255,215,0,.3),inset 0 0 20px rgba(255,215,0,.1);}
.rarity-sr .char-card{background:linear-gradient(135deg,#0f0f1a,#1a1a2a);border:3px solid #C0C0C0;box-shadow:0 0 30px rgba(192,192,192,.5);}
.rarity-c  .char-card{background:linear-gradient(135deg,#0a0a1a,#121230);border:2px solid #446;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.char-name{font-size:1.3rem;font-weight:900;color:#fff;margin-top:12px;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.char-serif{font-size:.85rem;color:#ffcc88;margin-top:6px;font-style:italic;line-height:1.4;}
.next-btn{padding:14px 40px;font-size:1.1rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(79,172,254,.4);transition:transform .15s;margin-top:8px;}
.next-btn:hover{transform:scale(1.05);}
.vr-shimmer{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,215,0,.15) 50%,transparent 70%);animation:shimmerMove 2s linear infinite;}
@keyframes shimmerMove{from{transform:translateX(-100%) translateY(-100%);}to{transform:translateX(50%) translateY(50%);}}
.confetti-piece{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;animation:confettiFall var(--dur,3s) var(--delay,0s) linear forwards;pointer-events:none;z-index:200;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:.3;}}
/* ZUKAN */
#zukanScreen{background:#050a14;overflow:hidden;flex-direction:column;}
.zukan-header{position:absolute;top:0;left:0;right:0;padding:14px 20px;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:space-between;z-index:10;border-bottom:1px solid rgba(255,215,0,.2);}
.zukan-title{color:#FFD700;font-size:1.1rem;font-weight:900;text-shadow:0 0 10px #FFD700;}
.zukan-close{padding:8px 20px;font-size:.9rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:20px;cursor:pointer;}
.zukan-grid{position:absolute;inset:0;top:56px;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;align-content:start;}
.zukan-card{border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .15s;position:relative;}
.zukan-card:hover{transform:scale(1.06);}
.zukan-card.unlocked-vr{background:linear-gradient(135deg,#1a1000,#3a2800);border:2px solid #FFD700;box-shadow:0 0 15px rgba(255,215,0,.4);}
.zukan-card.unlocked-sr{background:linear-gradient(135deg,#0f0f1a,#1a1a2a);border:2px solid #C0C0C0;box-shadow:0 0 10px rgba(192,192,192,.3);}
.zukan-card.unlocked-c{background:linear-gradient(135deg,#0a0a1a,#121230);border:2px solid #446;}
.zukan-card.locked{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);filter:grayscale(1);opacity:.35;}
.zukan-name{font-size:.65rem;font-weight:700;color:#fff;margin-top:4px;line-height:1.3;}
.zukan-new{position:absolute;top:-5px;right:-5px;background:#ff3f00;color:#fff;font-size:.6rem;font-weight:900;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.zukan-count{color:rgba(180,210,255,.6);font-size:.85rem;text-align:center;margin-bottom:4px;}
/* DETAIL MODAL */
#detailModal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#detailModal.show{opacity:1;pointer-events:all;}
.detail-box{background:linear-gradient(135deg,#0a0a20,#1a1a30);border-radius:20px;padding:28px 24px;max-width:320px;width:88%;text-align:center;position:relative;}
.detail-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.detail-rarity{font-size:.9rem;font-weight:700;letter-spacing:.2em;margin-bottom:8px;}
.detail-name{font-size:1.2rem;font-weight:900;color:#fff;margin-top:8px;}
.detail-serif{font-size:.85rem;color:#ffcc88;margin-top:6px;font-style:italic;}
.detail-count{font-size:.8rem;color:rgba(180,210,255,.6);margin-top:8px;}
/* MINIGAME */
#miniScreen{overflow:hidden;}
.mini-overlay{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
.mini-overlay.show{opacity:1;pointer-events:all;}
#clearOverlay{background:rgba(0,30,0,.92);}
#failOverlay{background:rgba(20,0,0,.92);}
.result-title{font-size:clamp(2rem,8vw,4rem);font-weight:900;text-align:center;margin-bottom:16px;}
#clearOverlay .result-title{color:#7fff7f;text-shadow:0 0 30px #0f0;}
#failOverlay  .result-title{color:#ff4444;text-shadow:0 0 30px #f00;}
.result-msg{color:#fff;font-size:1rem;margin-bottom:24px;text-align:center;line-height:1.7;padding:0 20px;white-space:pre-line;}
.replay-btn{padding:14px 40px;font-size:1.1rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#ff6b35,#ff3f00);color:#fff;border:none;border-radius:50px;cursor:pointer;transition:transform .15s;}
.replay-btn:hover{transform:scale(1.05);}
#game1{position:absolute;inset:0;background:linear-gradient(180deg,#87ceeb 0%,#5aa8c8 30%,#2d7a2d 55%,#1a5a1a 100%);}
#mtnCanvas{position:absolute;inset:0;width:100%;height:100%;}
.mtn-ui{position:absolute;top:12px;left:0;right:0;z-index:20;display:flex;justify-content:space-between;padding:0 16px;}
.mtn-bar-wrap{flex:1;height:24px;background:rgba(0,0,0,.4);border-radius:12px;overflow:hidden;margin:0 12px;}
.mtn-bar{height:100%;background:linear-gradient(90deg,#ff6b35,#FFD700);border-radius:12px;width:0%;transition:width .1s;}
.mtn-label{color:#fff;font-weight:700;font-size:.9rem;text-shadow:0 1px 3px rgba(0,0,0,.8);}
.tap-hint{position:absolute;bottom:14%;left:0;right:0;text-align:center;z-index:20;color:#fff;font-weight:700;font-size:1rem;text-shadow:0 0 8px rgba(0,0,0,.8);animation:hintBounce 1s infinite alternate;}
#game2{position:absolute;inset:0;background:linear-gradient(180deg,#e8e0d0 0%,#d4c8b0 100%);}
.gym-floor{position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(180deg,#c8a878,#b09060);}
.gym-line{position:absolute;bottom:44%;left:0;right:0;height:3px;background:#fff;opacity:.5;}
.teacher-wrap{position:absolute;bottom:calc(45% + 10px);left:50%;transform:translateX(-50%);z-index:10;}
.ball{position:absolute;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff4444,#880000);box-shadow:0 4px 15px rgba(0,0,0,.4);z-index:20;display:none;}
.player-dodge{position:absolute;bottom:46%;z-index:15;transition:left .15s;}
.dodge-ui{position:absolute;top:12px;left:0;right:0;z-index:30;text-align:center;}
.dodge-ui span{background:rgba(0,0,0,.6);color:#fff;padding:8px 20px;border-radius:20px;font-weight:700;}
.dodge-btns{position:absolute;bottom:8%;left:0;right:0;display:flex;gap:20px;justify-content:center;z-index:30;}
.dodge-btn{padding:18px 36px;font-size:1.3rem;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:none;border-radius:16px;cursor:pointer;transition:transform .1s;box-shadow:0 4px 15px rgba(0,0,0,.3);}
.dodge-btn:active{transform:scale(.92);}
.dodge-left{background:linear-gradient(135deg,#4488ff,#2255cc);color:#fff;}
.dodge-right{background:linear-gradient(135deg,#ff4488,#cc2255);color:#fff;}
.hit-effect{position:fixed;inset:0;z-index:60;background:rgba(255,0,0,.5);animation:flashOut .4s ease-out forwards;pointer-events:none;}
#game3{position:absolute;inset:0;background:linear-gradient(180deg,#c8c8d8 0%,#a0a0b8 40%,#888898 100%);}
.takaki-wrap{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);z-index:10;}
.shout-ui{position:absolute;top:12px;left:0;right:0;z-index:30;text-align:center;}
.shout-count{background:rgba(0,0,0,.7);color:#FFD700;padding:10px 24px;border-radius:20px;font-weight:900;font-size:1.1rem;display:inline-block;}
.shout-btns{position:absolute;bottom:6%;left:0;right:0;display:flex;flex-direction:column;gap:10px;align-items:center;z-index:30;}
.shout-btn{padding:14px 0;width:85%;max-width:340px;font-size:1.1rem;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:none;border-radius:16px;cursor:pointer;transition:transform .1s;box-shadow:0 4px 15px rgba(0,0,0,.3);}
.shout-btn:active{transform:scale(.94);}
.shout-btn1{background:linear-gradient(135deg,#ff6b35,#cc3300);color:#fff;}
.shout-btn2{background:linear-gradient(135deg,#4488ff,#2244aa);color:#fff;}
.sound-wave{position:absolute;border-radius:50%;border:3px solid rgba(255,200,100,.8);animation:soundExpand .8s ease-out forwards;pointer-events:none;}
@keyframes soundExpand{from{width:20px;height:20px;opacity:1;margin-left:-10px;margin-top:-10px;}to{width:200px;height:200px;opacity:0;margin-left:-100px;margin-top:-100px;}}
.reaction-bubble{position:absolute;background:#fff;border-radius:16px;padding:10px 16px;font-weight:900;font-size:1rem;z-index:50;animation:bubblePop .4s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes bubblePop{from{transform:scale(0);}to{transform:scale(1);}}
.reaction-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff;}
</style>
</head>
<body>

<!-- TITLE -->

<div class="screen" id="titleScreen">
  <div class="stars-layer" id="starsLayer"></div>
  <div class="lamp-glow"></div>
  <div class="houses">
    <svg viewBox="0 0 800 220" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
      <polygon points="0,180 80,80 160,180" fill="#080f1e"/><polygon points="60,180 160,60 260,180" fill="#091020"/><polygon points="200,180 320,50 440,180" fill="#080f1e"/><polygon points="380,180 480,70 580,180" fill="#091020"/><polygon points="520,180 640,55 760,180" fill="#080f1e"/>
      <rect x="20" y="145" width="60" height="55" fill="#06101e"/><polygon points="20,145 50,115 80,145" fill="#07121f"/><rect x="30" y="155" width="15" height="20" fill="#1a2f50" opacity=".7"/>
      <rect x="100" y="135" width="50" height="65" fill="#060e1c"/><polygon points="100,135 125,108 150,135" fill="#07101e"/>
      <rect x="170" y="150" width="70" height="50" fill="#07101e"/><polygon points="170,150 205,120 240,150" fill="#060e1c"/>
      <rect x="252" y="120" width="4" height="80" fill="#1a2535"/><ellipse cx="254" cy="118" rx="14" ry="5" fill="#ffeeaa" opacity=".9"/>
      <rect x="280" y="140" width="55" height="60" fill="#060e1c"/><polygon points="280,140 307,112 334,140" fill="#07101e"/>
      <rect x="350" y="130" width="80" height="70" fill="#07101e"/><polygon points="350,130 390,100 430,130" fill="#060e1c"/><rect x="375" y="165" width="20" height="35" fill="#07101e"/>
      <rect x="450" y="145" width="60" height="55" fill="#060e1c"/><polygon points="450,145 480,115 510,145" fill="#07101e"/>
      <rect x="524" y="125" width="4" height="75" fill="#1a2535"/><ellipse cx="526" cy="123" rx="14" ry="5" fill="#ffeeaa" opacity=".9"/>
      <rect x="550" y="135" width="65" height="65" fill="#07101e"/><polygon points="550,135 582,105 614,135" fill="#060e1c"/>

let currentChar=null, currentGame=0, miniRunning=false, gameTimer=null;
let mtnTaps=0, mtnStartTime=null, mtnAnimId=null;
const MTN_RUNNERS=[{name:'猿',x:15,y:0.8,emoji:'🐒'},{name:'ゴリラ',x:35,y:0.8,emoji:'🦍'},{name:'竹石快',x:55,y:0.8,emoji:'🧑\u200d🦱'}];

// ============ ZUKAN STATE (localStorage) ============
function loadZukan(){try{return JSON.parse(localStorage.getItem('mitsuke_zukan')||'{}');}catch(e){return {};}}
function saveZukan(z){try{localStorage.setItem('mitsuke_zukan',JSON.stringify(z));}catch(e){}}
function getZukanCount(){return Object.keys(loadZukan()).length;}
function updateZukanBadge(){
  const n=getZukanCount();
  document.getElementById('zukanBadge').textContent=n+'/'+CHARS.length;
}
function registerChar(c){
  const z=loadZukan();
  const isNew=!z[c.id];
  if(!z[c.id]) z[c.id]={count:0};
  z[c.id].count++;
  saveZukan(z);
  updateZukanBadge();
  return isNew;
}

// ============ TITLE STARS ============
(function(){const l=document.getElementById('starsLayer');for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star-dot';const sz=Math.random()*2.5+.5;s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*85+'%;left:'+Math.random()*100+'%;--d:'+(Math.random()*3+1.5).toFixed(1)+'s;--delay:'+(Math.random()*4).toFixed(1)+'s;';l.appendChild(s);}updateZukanBadge();})();

// ============ MODAL / GACHA ============
function openModal(){document.getElementById('modal').classList.add('show');}
function startGacha(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('titleScreen').classList.add('hidden');
  const gs=document.getElementById('gachaScreen');gs.classList.remove('hidden');
  const r=Math.random();let pool;
  if(r<.05)pool=CHARS.filter(c=>c.rarity==='vr');
  else if(r<.25)pool=CHARS.filter(c=>c.rarity==='sr');
  else pool=CHARS.filter(c=>c.rarity==='c');
  currentChar=pool[Math.floor(Math.random()*pool.length)];
  const dw=document.getElementById('dragonWrap');dw.style.display='flex';dw.style.transition='transform 1.2s cubic-bezier(.2,0,.6,1)';dw.style.transform='translateY(-60%)';
  let triggered=false;
  function onTap(){if(triggered)return;triggered=true;gs.removeEventListener('click',onTap);gs.removeEventListener('touchstart',onTap);
    document.getElementById('dragHint').style.display='none';dw.style.transition='transform .3s cubic-bezier(.2,1.5,.4,1)';dw.style.transform='translateY(10%)';
    gs.classList.add('shake');setTimeout(()=>gs.classList.remove('shake'),500);spawnParticles();
    // カプセル出現後、自動でクラックへ（タップ不要）
    setTimeout(()=>{const cw=document.getElementById('capsuleWrap');cw.classList.remove('hidden');const fl=document.createElement('div');fl.className='flash';document.body.appendChild(fl);setTimeout(()=>fl.remove(),600);},400);
    setTimeout(()=>crackCapsule(),900);}
  gs.addEventListener('click',onTap);gs.addEventListener('touchstart',onTap,{passive:true});}

function crackCapsule(){
  const cw=document.getElementById('capsuleWrap');if(cw.dataset.cracked)return;cw.dataset.cracked='1';
  document.getElementById('capsuleSvg').classList.add('capsule-crack');
  const fl=document.createElement('div');fl.className='flash';document.body.appendChild(fl);setTimeout(()=>fl.remove(),600);
  setTimeout(startTease,600);}

function startTease(){
  document.getElementById('gachaScreen').querySelector('.light-beams').style.animation='rotateLights .5s linear infinite';
  document.getElementById('teaseOverlay').classList.add('show');spawnParticles();
  const c=currentChar;const rLbl=c.rarity==='vr'?'⭐⭐⭐⭐ VICTORY RARE！！':c.rarity==='sr'?'⭐⭐⭐ SUPER RARE！':'⭐⭐ COMMON';
  const seqs=[['なんと…','この人物は…',rLbl],['まさか…','見附が誇る','あの人物か！？'],['ッッッ！！','その名は…','…………']];
  const s=seqs[Math.floor(Math.random()*seqs.length)];
  document.getElementById('teaseText').textContent=s[0];
  setTimeout(()=>{document.getElementById('teaseMsg').textContent=s[1];},700);
  setTimeout(()=>{document.getElementById('teaseSub').textContent=s[2];spawnParticles();const fl=document.createElement('div');fl.className='flash';document.body.appendChild(fl);setTimeout(()=>fl.remove(),500);},1800);
  // 虹フラッシュ (SR以上)
  if(c.rarity==='vr'||c.rarity==='sr'){
    setTimeout(()=>{const rb=document.createElement('div');rb.className='rainbow-flash';document.body.appendChild(rb);setTimeout(()=>rb.remove(),1300);},2000);
  }
  setTimeout(()=>{document.getElementById('teaseOverlay').classList.remove('show');showCard();},3200);}

function spawnParticles(){
  const con=document.getElementById('particleContainer');const cols=['#FFD700','#ff6600','#ff0044','#00ffff','#ff00ff','#ffffff'];
  for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';const c=cols[Math.floor(Math.random()*cols.length)];const sz=Math.random()*8+3;
    p.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+c+';left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--tx:'+(Math.random()-.5)*300+'px;--ty:'+-(Math.random()*300+100)+'px;--dur:'+(Math.random()*1.5+1).toFixed(1)+'s;--delay:'+(Math.random()*2).toFixed(1)+'s;';con.appendChild(p);}
  setTimeout(()=>con.innerHTML='',5000);}

function showCard(){
  document.getElementById('gachaScreen').classList.add('hidden');
  const cs=document.getElementById('cardScreen');cs.classList.remove('hidden');
  const c=currentChar;
  // 図鑑に登録
  const isNew=registerChar(c);
  const bg=document.getElementById('cardBg');
  if(c.rarity==='vr'){bg.style.background='radial-gradient(ellipse at center,#2a1500 0%,#000 100%)';spawnConfetti(80);}
  else if(c.rarity==='sr'){bg.style.background='radial-gradient(ellipse at center,#0a0a20 0%,#000 100%)';spawnConfetti(30);}
  else bg.style.background='radial-gradient(ellipse at center,#050520 0%,#000 100%)';
  const rT=c.rarity==='vr'?'⭐⭐⭐⭐ VICTORY RARE':c.rarity==='sr'?'⭐⭐⭐ SUPER RARE':'⭐⭐ COMMON';
  const z=loadZukan();const cnt=z[c.id]?z[c.id].count:1;
  const con=document.getElementById('cardContainer');con.className='card-container rarity-'+c.rarity;
  con.innerHTML='<div class="rarity-label">'+rT+(isNew?' &nbsp;<span style="color:#ff6b35;font-size:.85rem;">NEW！</span>':'')+'</div><div class="char-card">'+(c.rarity==='vr'?'<div class="vr-shimmer"></div>':'')+c.svg+'<div class="char-name">'+c.name+'</div>'+(c.serif?'<div class="char-serif">「'+c.serif+'」</div>':'')+'<div style="font-size:.75rem;color:rgba(200,200,255,.5);margin-top:6px;">入手回数: '+cnt+'回</div></div><button class="next-btn" onclick="launchMini()">🎮 ミニゲームへ</button>';}

function spawnConfetti(n){const cols=['#FFD700','#ff6b35','#ff3399','#33aaff','#66ff44','#ff44ff'];for(let i=0;i<n;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText='left:'+Math.random()*100+'%;background:'+cols[Math.floor(Math.random()*cols.length)]+';--dur:'+(Math.random()*2+2).toFixed(1)+'s;--delay:'+(Math.random()*2).toFixed(1)+'s;transform:rotate('+Math.random()*360+'deg);';document.body.appendChild(el);setTimeout(()=>el.remove(),5000);}}

// ============ ZUKAN ============
function openZukan(){
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('zukanScreen').classList.remove('hidden');
  renderZukan();}
function closeZukan(){
  document.getElementById('zukanScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');}
function renderZukan(){
  const z=loadZukan();
  const grid=document.getElementById('zukanGrid');
  const unlocked=Object.keys(z).length;
  grid.innerHTML='<div class="zukan-count" style="grid-column:1/-1;">コンプリート: '+unlocked+' / '+CHARS.length+'</div>';
  CHARS.forEach(c=>{
    const have=z[c.id];
    const div=document.createElement('div');
    div.className='zukan-card '+(have?'unlocked-'+c.rarity:'locked');
    if(have){div.innerHTML=c.svg+'<div class="zukan-name">'+c.name+'</div><div style="font-size:.6rem;color:rgba(200,200,255,.5);">×'+have.count+'</div>';div.onclick=()=>openDetail(c);}
    else{div.innerHTML='<div style="font-size:2.5rem;">❓</div><div class="zukan-name" style="color:rgba(255,255,255,.3);">？？？</div>';}
    grid.appendChild(div);});}
function openDetail(c){
  const z=loadZukan();const cnt=z[c.id]?z[c.id].count:0;
  const rT=c.rarity==='vr'?'⭐⭐⭐⭐ VICTORY RARE':c.rarity==='sr'?'⭐⭐⭐ SUPER RARE':'⭐⭐ COMMON';
  const col=c.rarity==='vr'?'#FFD700':c.rarity==='sr'?'#C0C0C0':'#88aaff';
  document.getElementById('detailContent').innerHTML='<div class="detail-rarity" style="color:'+col+'">'+rT+'</div>'+c.svg+'<div class="detail-name">'+c.name+'</div>'+(c.serif?'<div class="detail-serif">「'+c.serif+'」</div>':'')+'<div class="detail-count">入手回数: '+cnt+'回</div>';
  document.getElementById('detailModal').classList.add('show');}
function closeDetail(){document.getElementById('detailModal').classList.remove('show');}

// ============ MINI LAUNCH ============
function launchMini(){document.getElementById('cardScreen').classList.add('hidden');currentGame=Math.floor(Math.random()*3);document.getElementById('miniScreen').classList.remove('hidden');if(currentGame===0)startMountain();else if(currentGame===1)startDodge();else startShout();}

// ============ GAME1: MOUNTAIN ============
function startMountain(){
  document.getElementById('game1').style.display='block';mtnTaps=0;miniRunning=true;
  MTN_RUNNERS.forEach((r,i)=>{r.x=15+i*25;r.y=0.8;});
  const canvas=document.getElementById('mtnCanvas');canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  drawMountain(canvas);updateMtnUI();mtnStartTime=Date.now();
  const LIMIT=5000;
  gameTimer=setInterval(()=>{if(!miniRunning){clearInterval(gameTimer);return;}
    const elapsed=Date.now()-mtnStartTime;const remain=Math.max(0,(LIMIT-elapsed)/1000);
    document.getElementById('mtnTimeLabel').textContent=remain.toFixed(1)+'s';
    if(elapsed>=LIMIT){clearInterval(gameTimer);if(miniRunning)triggerGameFail('時間切れ！','山頂に届かなかった…壮行式に間に合わなかった');}},100);
  canvas.addEventListener('click',onMtnTap);canvas.addEventListener('touchstart',onMtnTap,{passive:true});animateMtn();}
function onMtnTap(e){if(!miniRunning)return;e.preventDefault&&e.preventDefault();mtnTaps++;MTN_RUNNERS.forEach((r,i)=>{r.y=Math.max(0.05,r.y-(0.008+(i===1?0.006:i===2?0.009:0.007)));});updateMtnUI();if(mtnTaps>=30){const leader=MTN_RUNNERS.reduce((a,b)=>a.y<b.y?a:b);triggerGameClear(leader.name+'が山頂制覇！','壮行式を完全スルー！！誰も気づかなかった…はず。');}}
function updateMtnUI(){document.getElementById('mtnTapLabel').textContent='連打: '+mtnTaps;document.getElementById('mtnBar').style.width=Math.min(100,(mtnTaps/30)*100)+'%';}
function drawMountain(canvas){const W=canvas.width,H=canvas.height,ctx=canvas.getContext('2d');const sky=ctx.createLinearGradient(0,0,0,H*0.6);sky.addColorStop(0,'#87ceeb');sky.addColorStop(1,'#c8e8f8');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.6);ctx.fillStyle='#5a7a4a';ctx.beginPath();ctx.moveTo(0,H*0.8);ctx.lineTo(W*0.2,H*0.25);ctx.lineTo(W*0.5,H*0.08);ctx.lineTo(W*0.8,H*0.25);ctx.lineTo(W,H*0.8);ctx.closePath();ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(W*0.35,H*0.2);ctx.lineTo(W*0.5,H*0.08);ctx.lineTo(W*0.65,H*0.2);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,200,.6)';ctx.lineWidth=3;ctx.setLineDash([8,6]);ctx.beginPath();ctx.moveTo(W*0.5,H*0.1);ctx.lineTo(W*0.45,H*0.4);ctx.lineTo(W*0.4,H*0.7);ctx.lineTo(W*0.3,H*0.85);ctx.stroke();ctx.setLineDash([]);const gnd=ctx.createLinearGradient(0,H*0.8,0,H);gnd.addColorStop(0,'#4a7a3a');gnd.addColorStop(1,'#2a5a1a');ctx.fillStyle=gnd;ctx.fillRect(0,H*0.8,W,H*0.2);ctx.fillStyle='#c8a880';ctx.fillRect(W*0.72,H*0.55,W*0.22,H*0.25);ctx.fillStyle='#a08060';ctx.beginPath();ctx.moveTo(W*0.72,H*0.55);ctx.lineTo(W*0.83,H*0.42);ctx.lineTo(W*0.94,H*0.55);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(0,0,0,.3)';ctx.font='bold '+W*0.04+'px sans-serif';ctx.textAlign='center';ctx.fillText('壮行式中',W*0.83,H*0.68);}
function animateMtn(){const canvas=document.getElementById('mtnCanvas');if(!miniRunning||!canvas)return;const W=canvas.width,H=canvas.height,ctx=canvas.getContext('2d');drawMountain(canvas);MTN_RUNNERS.forEach((r,i)=>{const px=W*(0.25+i*0.25);const py=H*r.y;ctx.save();ctx.font=Math.max(28,H*0.06)+'px serif';ctx.textAlign='center';ctx.fillText(r.emoji,px,py);ctx.font='bold 12px sans-serif';ctx.fillStyle='#fff';ctx.shadowColor='#000';ctx.shadowBlur=3;ctx.fillText(r.name,px,py+20);ctx.shadowBlur=0;ctx.restore();});mtnAnimId=requestAnimationFrame(animateMtn);}

// ============ GAME2: DODGEBALL ============
function startDodge(){document.getElementById('game2').style.display='block';miniRunning=true;dodgeRound=0;playerX=50;ballLaunched=false;document.getElementById('teacherWrap').innerHTML=INOUE_H_MINI_SVG;document.getElementById('playerDodge').innerHTML='<svg viewBox="0 0 50 65" width="44" height="58" xmlns="http://www.w3.org/2000/svg"><ellipse cx="25" cy="16" rx="14" ry="14" fill="#f5c8a0"/><rect x="12" y="28" width="26" height="30" rx="5" fill="#3366cc"/><ellipse cx="16" cy="52" rx="8" ry="7" fill="#222"/><ellipse cx="34" cy="52" rx="8" ry="7" fill="#222"/><ellipse cx="19" cy="14" rx="4" ry="4" fill="#1a1a1a"/><ellipse cx="31" cy="14" rx="4" ry="4" fill="#1a1a1a"/></svg>';updateDodgePlayer();setTimeout(()=>launchBall(),1200);}
function updateDodgePlayer(){const W=document.getElementById('game2').offsetWidth;document.getElementById('playerDodge').style.left=(playerX/100*W-22)+'px';}
function launchBall(){if(!miniRunning)return;ballLaunched=true;const g=document.getElementById('game2');const W=g.offsetWidth,H=g.offsetHeight;const ball=document.getElementById('ball');ball.style.display='block';const ballTarget=Math.random()<.5?'left':'right';const targetX=ballTarget==='left'?W*0.2:W*0.8;ball.style.left=(W/2-30)+'px';ball.style.top=(H*0.08)+'px';ball.style.transition='none';document.getElementById('dodgeStatus').textContent='井上先生が投げた！ たったった！';setTimeout(()=>{ball.style.transition='left 0.9s linear, top 0.9s linear';ball.style.left=(targetX-30)+'px';ball.style.top=(H*0.45)+'px';},100);setTimeout(()=>{if(miniRunning)checkHit(ballTarget);},1100);}
function dodge(dir){if(!miniRunning||!ballLaunched)return;if(dir==='left')playerX=Math.max(5,playerX-40);else playerX=Math.min(95,playerX+40);updateDodgePlayer();}
function checkHit(ballTarget){if(!miniRunning)return;const ballEl=document.getElementById('ball');const playerEl=document.getElementById('playerDodge');const bR=ballEl.getBoundingClientRect(),pR=playerEl.getBoundingClientRect();const overlap=!(bR.right<pR.left||bR.left>pR.right||bR.bottom<pR.top||bR.top>pR.bottom);ballEl.style.display='none';ballLaunched=false;if(overlap){const hit=document.createElement('div');hit.className='hit-effect';document.body.appendChild(hit);setTimeout(()=>hit.remove(),500);const eff=document.createElement('div');eff.style.cssText='position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none;';eff.innerHTML='<div style="font-size:clamp(2rem,10vw,4rem);font-weight:900;color:#fff;text-shadow:0 0 30px #f00;animation:teasePulse .3s infinite alternate;">ばちいいいいん！</div>';document.body.appendChild(eff);setTimeout(()=>eff.remove(),1200);setTimeout(()=>triggerGameFail('ボールが顔面に直撃！！','「ばちいいいいん！」\n顔が真っ赤になった…'),1000);}else{dodgeRound++;document.getElementById('dodgeStatus').textContent='よけた！ ('+dodgeRound+'/3回)';if(dodgeRound>=3){triggerGameClear('3球全部よけた！！','井上先生の剛速球を全弾回避！');}else{playerX=50;updateDodgePlayer();setTimeout(()=>launchBall(),1000);}}}

// ============ GAME3: SHOUT ============
function startShout(){document.getElementById('game3').style.display='block';miniRunning=true;shoutRemain=3;const canvas=document.getElementById('gymCanvas');canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;drawGym(canvas);document.getElementById('takakiWrap').innerHTML='<div style="transform:scale(0.5);opacity:0.7;">'+TAKAKI_SVG+'</div>';document.getElementById('shoutCount').textContent='🎯 残り '+shoutRemain+' 回';shoutRunning=true;}
function drawGym(canvas){const W=canvas.width,H=canvas.height,ctx=canvas.getContext('2d');const fl=ctx.createLinearGradient(0,H*0.5,0,H);fl.addColorStop(0,'#c8a878');fl.addColorStop(1,'#a88850');ctx.fillStyle=fl;ctx.fillRect(0,H*0.5,W,H*0.5);ctx.fillStyle='#888898';ctx.fillRect(0,0,W,H*0.5);ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=2;for(let i=0;i<=6;i++){ctx.beginPath();ctx.moveTo(i*W/6,H*0.5);ctx.lineTo(W/2,0);ctx.stroke();}ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='bold '+W*0.05+'px sans-serif';ctx.textAlign='center';ctx.fillText('体育館の奥…',W/2,H*0.25);}
function shout(type){if(!miniRunning||!shoutRunning)return;shoutRunning=false;const heard=Math.random()<0.5;let safe=false,msg='';if(type==='takagi'){safe=true;msg=heard?'「タカギ？　誰だよ」 …気づかれなかった！':'声が届かなかった。セーフ！';}else{if(!heard){safe=true;msg='声が届かなかった…セーフ！';}else{safe=false;msg='「誰だ！」タカキが振り返った！！';}}const tw=document.getElementById('takakiWrap');const bubble=document.createElement('div');bubble.className='reaction-bubble';bubble.style.cssText='position:absolute;bottom:70px;left:50%;transform:translateX(-50%);color:'+(safe?'#006600':'#cc0000')+';font-size:2rem;';bubble.textContent=safe?'😶':'😡';tw.appendChild(bubble);const wave=document.createElement('div');wave.className='sound-wave';wave.style.cssText='position:absolute;left:50%;bottom:20%;z-index:25;';document.getElementById('game3').appendChild(wave);setTimeout(()=>wave.remove(),900);setTimeout(()=>{bubble.remove();if(!safe){triggerGameFail('バレた！！',msg+'\nタカキに呼び捨てがバレた…');return;}shoutRemain--;document.getElementById('shoutCount').textContent='🎯 残り '+shoutRemain+' 回';if(shoutRemain<=0){triggerGameClear('3回全部バレずに呼べた！！','タカキは最後まで気づかなかった。\n伝説の呼び捨て成功！');return;}setTimeout(()=>{shoutRunning=true;},600);},900);}

// ============ RESULTS ============
function triggerGameClear(title,msg){if(!miniRunning)return;miniRunning=false;cancelAnimationFrame(mtnAnimId);clearInterval(gameTimer);stopMtnListeners();document.getElementById('clearMsg').textContent=msg||title;spawnConfetti(80);setTimeout(()=>document.getElementById('clearOverlay').classList.add('show'),600);}
function triggerGameFail(title,msg){if(!miniRunning)return;miniRunning=false;cancelAnimationFrame(mtnAnimId);clearInterval(gameTimer);stopMtnListeners();document.getElementById('failMsg').textContent=msg||title;setTimeout(()=>document.getElementById('failOverlay').classList.add('show'),600);}
function stopMtnListeners(){const c=document.getElementById('mtnCanvas');c.removeEventListener('click',onMtnTap);c.removeEventListener('touchstart',onMtnTap);}

// ============ RESTART ============
function restartAll(){
  ['clearOverlay','failOverlay'].forEach(id=>document.getElementById(id).classList.remove('show'));
  ['game1','game2','game3'].forEach(id=>{document.getElementById(id).style.display='none';});
  document.getElementById('miniScreen').classList.add('hidden');document.getElementById('cardScreen').classList.add('hidden');document.getElementById('gachaScreen').classList.add('hidden');
  document.getElementById('dragonWrap').style.display='none';
  const cw=document.getElementById('capsuleWrap');cw.classList.add('hidden');cw.dataset.cracked='';cw.style.animation='';
  document.getElementById('capsuleSvg').classList.remove('capsule-crack');document.getElementById('teaseOverlay').classList.remove('show');document.getElementById('dragHint').style.display='';
  document.getElementById('particleContainer').innerHTML='';document.getElementById('ball').style.display='none';
  cancelAnimationFrame(mtnAnimId);clearInterval(gameTimer);miniRunning=false;mtnTaps=0;dodgeRound=0;shoutRemain=3;ballLaunched=false;playerX=50;
  updateZukanBadge();document.getElementById('titleScreen').classList.remove('hidden');}
</script>
